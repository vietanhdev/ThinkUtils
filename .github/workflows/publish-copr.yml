name: Publish to COPR

# workflow_dispatch only. A COPR build is queued against a public repository
# users install from, and a bad SRPM is visible immediately.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must be an existing git tag, without the leading v)"
        required: true
      dry_run:
        description: "Build the SRPM but do not submit it"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    container:
      image: fedora:41
    steps:
      - name: Install build tooling
        run: |
          set -euo pipefail
          dnf install -y -q rpm-build rpmdevtools copr-cli git jq curl
          # Needed for the pushed-tag check below.
          git config --global --add safe.directory '*'

      # The TAG, not the default branch. Without this the workflow publishes
      # whatever main happens to contain while labelling it with the requested
      # version -- so a release cut days ago would ship today's spec, PKGBUILD
      # and manifests under the old version number.
      - uses: actions/checkout@v7
        with:
          ref: v${{ inputs.version }}

      # Source0 points at the tag tarball, so a queued build 404s partway through
      # if the tag is not pushed. Cheaper to catch here than in the build log.
      - name: Verify the tag is pushed
        run: |
          set -euo pipefail
          tag="v${{ inputs.version }}"
          # Explicit URL, not the `origin` alias: inside a container the
          # checkout's git config is not reliably readable, and `git ls-remote
          # origin` then fails with "'origin' does not appear to be a git
          # repository" -- which this step reported as "the tag does not exist".
          # A misleading error about the wrong thing entirely.
          repo="https://github.com/${{ github.repository }}.git"
          git ls-remote --exit-code --tags "${repo}" "refs/tags/${tag}" >/dev/null || {
            echo "::error::${tag} does not exist on origin - push it before publishing"
            exit 1
          }
          echo "OK: ${tag} exists on origin"

      - name: Version must match the manifests
        run: ./scripts/bump-version.sh --check

      - name: Build the SRPM
        run: |
          set -euo pipefail
          rpmdev-setuptree
          cp packaging/copr/thinkutils.spec ~/rpmbuild/SPECS/

          # -g fetches Source0; -R places it where rpmbuild expects. Doing this
          # here rather than on the COPR builder means a broken Source0 fails
          # now instead of after a queue wait.
          spectool -g -R ~/rpmbuild/SPECS/thinkutils.spec
          rpmbuild -bs ~/rpmbuild/SPECS/thinkutils.spec

          srpm=$(find ~/rpmbuild/SRPMS -name '*.src.rpm' | head -1)
          [ -n "$srpm" ] || { echo "::error::no SRPM produced"; exit 1; }
          echo "SRPM=$srpm" >> "$GITHUB_ENV"
          rpm -qip "$srpm"

      - name: Lint the spec
        run: rpmlint packaging/copr/thinkutils.spec || true

      - name: Submit to COPR
        if: ${{ !inputs.dry_run }}
        env:
          COPR_API_TOKEN: ${{ secrets.COPR_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${COPR_API_TOKEN:-}" ]; then
            echo "::error::COPR_API_TOKEN is not set"
            exit 1
          fi

          install -d -m 700 ~/.config
          printf '%s\n' "$COPR_API_TOKEN" > ~/.config/copr
          chmod 600 ~/.config/copr

          # Chroots resolved rather than hardcoded -- a fixed list goes stale
          # every six months when Fedora branches.
          #
          # Selected PER ARCHITECTURE, and that structure is load-bearing rather
          # than stylistic. The obvious one-liner -- widening the regex to
          # (x86_64|aarch64) and keeping `tail -3` -- takes the last three of the
          # COMBINED list, so "newest three releases" silently becomes "newest
          # three chroots across both arches". Checked against a realistic chroot
          # list, that yields fedora-42-x86_64, fedora-43-aarch64,
          # fedora-43-x86_64: two releases of one arch, one of the other, and
          # fedora-41 dropped entirely. Which arch loses coverage shifts every
          # time Fedora branches, and it exits 0 either way.
          #
          # This list must stay in step with ExclusiveArch in the spec: a chroot
          # for an arch the spec excludes is a build that fails, and an arch in
          # the spec with no chroot here is simply never built. Widening
          # ExclusiveArch alone ships nothing.
          COPR_ARCHES=(x86_64 aarch64)
          CHROOTS=()
          for a in "${COPR_ARCHES[@]}"; do
            mapfile -t arch_chroots < <(copr-cli list-chroots 2>/dev/null \
              | grep -E "^fedora-[0-9]+-${a}$" | sort -V | tail -3)
            if [ "${#arch_chroots[@]}" -eq 0 ]; then
              echo "::error::no active fedora ${a} chroots found - ${a} would silently never build"
              exit 1
            fi
            CHROOTS+=("${arch_chroots[@]}")
          done
          echo "chroots: ${CHROOTS[*]}"

          # `copr-cli list` prints "Name: <project>" plus an indented block, not a
          # bare name, so grepping for the name alone never matches and the script
          # tries to create a project that already exists.
          # Herestring, not a pipe into grep -q: grep -q exits on first match,
          # the upstream command takes SIGPIPE, and pipefail turns a successful
          # match into a failed test. That exact shape broke the aarch64 release
          # verification, where finding the file reported it as missing.
          projects="$(copr-cli list 2>/dev/null || true)"
          if ! grep -qE "^Name:[[:space:]]+thinkutils$" <<<"$projects"; then
            echo ">> creating COPR project thinkutils"
            # Separate argv entries. "${CHROOTS[@]/#/--chroot }" looks equivalent
            # but puts the space INSIDE one argument, so copr-cli sees a single
            # unrecognised "--chroot fedora-43-x86_64" token and bails.
            CHROOT_ARGS=()
            for c in "${CHROOTS[@]}"; do CHROOT_ARGS+=(--chroot "${c}"); done
            copr-cli create thinkutils "${CHROOT_ARGS[@]}" \
              --description "ThinkPad fan control, battery care and system monitoring" \
              --enable-net on
          fi

          # --enable-net is REQUIRED, not cosmetic: mock disables builder
          # networking by default and the spec fetches crates during %build.
          # It is a property of the PROJECT, so it does not travel with the
          # repository -- hence setting it on every publish rather than trusting
          # that someone did it once.
          copr-cli modify thinkutils --enable-net on || \
            echo "::warning::could not set --enable-net; the build will fail if it is off"

          args=()
          for c in "${CHROOTS[@]}"; do args+=(-r "$c"); done

          copr-cli build "${args[@]}" thinkutils "${SRPM}"

      - name: Dry run notice
        if: ${{ inputs.dry_run }}
        run: echo "Dry run - the SRPM built but was not submitted. Re-run with dry_run unchecked to publish."
