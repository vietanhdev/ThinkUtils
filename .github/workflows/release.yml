name: Build and Release

on:
  push:
    tags:
      - 'v*'
  # Rehearse the whole pipeline without burning a version number. Replaces the
  # old push-to-main trigger, which built a release on every merge; ci.yml now
  # covers main.
  workflow_dispatch:

jobs:
  # Cut a tag and you run the exact CI pipeline, not a copy of it that can drift.
  # Until now a broken commit tagged vX.Y.Z shipped automatically -- the tests
  # existed and had never once gated a release.
  ci:
    uses: ./.github/workflows/ci.yml

  # Two architectures, built NATIVELY on their own runner.
  #
  # `runs-on` picks the CPU, `container` pins the glibc floor -- separate
  # concerns, and separating them is what fixes the long-standing note here.
  # Tauri's deb bundler reads the floor off the BUILD HOST, so building on 24.04
  # (glibc 2.39) emits a package declaring libc6 (>= 2.39), which apt then
  # refuses on Ubuntu 22.04 (2.35) and Debian 12 (2.36). That was previously
  # pinned by staying on the `ubuntu-22.04` runner label, which GitHub is
  # deprecating; `container: ubuntu:22.04` makes the floor ours to choose rather
  # than GitHub's to withdraw, and works identically on both arches because the
  # image is multi-arch.
  #
  # NOT cross-compiled: Tauri's bundlers infer the architecture from the build
  # host and declare none in the manifest, so `--target aarch64-...` would stage
  # host artifacts under an aarch64 name and ship an x86_64 binary in an arm64
  # package.
  build:
    needs: ci
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64, deb_arch: amd64, rpm_arch: x86_64, file_arch: "x86-64", runner: ubuntu-24.04 }
          - { arch: aarch64, deb_arch: arm64, rpm_arch: aarch64, file_arch: "ARM aarch64", runner: ubuntu-24.04-arm }
    name: build (${{ matrix.arch }})
    container:
      image: ubuntu:22.04
    defaults:
      run:
        shell: bash
    timeout-minutes: 90

    steps:
      # Before checkout: the action needs git inside the container, and running
      # as root over a runner-owned workspace trips git's dubious-ownership guard.
      - name: Bootstrap the 22.04 build image
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl wget file git jq pkg-config build-essential \
            libssl-dev rpm xz-utils sudo binutils \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf xdg-utils
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      # If GitHub renames or withdraws the arm label, `runs-on` falls back and
      # this job would build x86_64 twice and publish it under an arm64 name,
      # staying green. Users on arm64 would install a package that cannot run.
      - name: This runner really is ${{ matrix.arch }}
        run: |
          set -euo pipefail
          actual="$(uname -m)"
          if [ "${actual}" != "${{ matrix.arch }}" ]; then
            echo "::error::matrix says ${{ matrix.arch }} but this runner is ${actual} - refusing to publish a mislabelled package"
            exit 1
          fi
          echo "confirmed ${actual}"

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # An x86_64 cache restored into an aarch64 build poisons target/ with
          # foreign objects, and the resulting link error points nowhere near it.
          key: ${{ matrix.arch }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        # linuxdeploy is itself an AppImage and mounts via FUSE, which a container
        # does not have. Without this the bundle dies on a fuse error AFTER the
        # .deb and .rpm have already built.
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: npm run tauri build

      - name: Get version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Rename packages
        run: |
          set -euo pipefail
          V="${{ steps.version.outputs.version }}"
          B=src-tauri/target/release/bundle

          cd "$B/deb"
          DEB_FILE=$(ls *.deb | head -n 1)
          mv "$DEB_FILE" "thinkutils_${V}_${{ matrix.deb_arch }}.deb"

          cd ../rpm
          RPM_FILE=$(ls *.rpm | head -n 1)
          mv "$RPM_FILE" "thinkutils-${V}.${{ matrix.rpm_arch }}.rpm"

          # The AppImage was uploaded under whatever Tauri defaulted to while the
          # deb and rpm carried clean versioned names, so releases shipped one
          # asset named inconsistently with the other two.
          cd ../appimage
          APPIMAGE_FILE=$(ls *.AppImage | head -n 1)
          mv "$APPIMAGE_FILE" "thinkutils_${V}_${{ matrix.deb_arch }}.AppImage"

      # cargo tauri build exiting 0 only proves the metadata parsed. These assert
      # the package CONTAINS what it promises, before it is published.
      - name: Verify package contents
        run: |
          set -euo pipefail
          V="${{ steps.version.outputs.version }}"
          deb="src-tauri/target/release/bundle/deb/thinkutils_${V}_${{ matrix.deb_arch }}.deb"

          # Listed ONCE into a variable, then matched with a herestring.
          #
          # `dpkg-deb --contents "$deb" | grep -q ...` is broken under pipefail
          # and broken in the worst direction: grep -q exits the instant it
          # matches, dpkg-deb takes SIGPIPE writing the rest of the listing, and
          # pipefail propagates that non-zero status -- so FINDING the file makes
          # the check report it missing. It is timing-dependent, which is why it
          # passed on x86_64 and failed the aarch64 release with
          # "tar subprocess was killed by signal (Broken pipe)".
          #
          # A herestring has no upstream process to kill. Piping into plain
          # `grep` (no -q) also works, because grep then reads to EOF.
          contents="$(dpkg-deb --contents "$deb")"

          grep -q 'usr/bin/thinkutils' <<<"$contents" \
            || { echo "::error::.deb does not ship /usr/bin/thinkutils"; exit 1; }

          grep -q 'applications/.*\.desktop' <<<"$contents" \
            || { echo "::error::.deb ships no .desktop entry - the app would not appear in any launcher"; exit 1; }

          # The binary's real machine type, not the matrix's claim about it. This
          # is the last point where a cross-compile mishap or a wrong runner is
          # still catchable before users get the package.
          got=$(file -b src-tauri/target/release/thinkutils)
          case "$got" in
            *"${{ matrix.file_arch }}"*) ;;
            *) echo "::error::built binary is '$got', expected ${{ matrix.file_arch }}"; exit 1 ;;
          esac

          # Tauri's dependency auto-detection is incomplete, so apt resolving the
          # Depends line does not prove the binary can start. ldd is what proves it.
          if ldd src-tauri/target/release/thinkutils | grep "not found"; then
            echo "::error::binary has unresolved shared libraries"
            exit 1
          fi

          floor=$(objdump -T src-tauri/target/release/thinkutils \
            | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -uV | tail -1)
          echo "highest glibc symbol required: ${floor}"
          case "${floor}" in
            GLIBC_2.3[6-9]|GLIBC_2.[4-9][0-9]|GLIBC_[3-9]*)
              echo "::error::binary requires ${floor}, above the Ubuntu 22.04 floor (2.35)"
              exit 1 ;;
          esac
          echo "OK: ${{ matrix.arch }} package ships the binary, a desktop entry, resolves every library, and holds the glibc floor"

      - uses: actions/upload-artifact@v7
        with:
          name: release-packages-${{ matrix.arch }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 7

  # One job, after BOTH arches. The APT repository is rebuilt from scratch each
  # release, so running this per-arch would have the two legs racing to publish
  # a repo containing only their own packages.
  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Get version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v8
        with:
          pattern: release-packages-*
          merge-multiple: true
          path: staged

      - name: Restore the bundle layout
        run: |
          set -euo pipefail
          for kind in deb rpm appimage; do
            mkdir -p "src-tauri/target/release/bundle/${kind}"
          done
          find staged -name '*.deb'      -exec mv {} src-tauri/target/release/bundle/deb/ ';'
          find staged -name '*.rpm'      -exec mv {} src-tauri/target/release/bundle/rpm/ ';'
          find staged -name '*.AppImage' -exec mv {} src-tauri/target/release/bundle/appimage/ ';'

          # Both arches must be present. A missing one would otherwise publish a
          # release quietly short of half its packages -- and the download page
          # advertises arm64, so users would follow a link to nothing.
          for a in amd64 arm64; do
            ls src-tauri/target/release/bundle/deb/*_${a}.deb >/dev/null 2>&1 \
              || { echo "::error::no ${a} .deb among the artifacts - refusing to publish a half release"; exit 1; }
          done
          find src-tauri/target/release/bundle -type f -print

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update APT repository
        if: startsWith(github.ref, 'refs/tags/')
        env:
          # Unset until a signing key exists, in which case the step publishes
          # unsigned and says so loudly rather than failing the release.
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          # This step publishes to a live APT repo that users have in their
          # sources.list. A half-finished run takes that repo down, so it fails
          # fast rather than pressing on.
          set -euo pipefail

          # dpkg-dev provides dpkg-scanpackages; apt-utils provides
          # apt-ftparchive. The runner image happens to preinstall apt-utils, so
          # omitting it worked by luck rather than by declaration.
          sudo apt-get install -y dpkg-dev apt-utils

          # Verify the .deb exists BEFORE touching the published repo. The old
          # order deleted the existing package first and copied second, so a glob
          # that matched nothing left an empty apt/ -- which then got committed,
          # taking the repository offline for everyone installing via apt.
          deb_count=$(ls -1 src-tauri/target/release/bundle/deb/*.deb 2>/dev/null | wc -l) || true
          if [ "${deb_count:-0}" -eq 0 ]; then
            echo "::error::no .deb was built - refusing to touch the published APT repository"
            exit 1
          fi
          echo "found ${deb_count} .deb to publish"

          # Clone or create gh-pages branch
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          git worktree add gh-pages-dir gh-pages 2>/dev/null || {
            git worktree add --detach gh-pages-dir
            cd gh-pages-dir
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            cd ..
          }

          # Set up apt directory
          mkdir -p gh-pages-dir/apt

          # Stage into a fresh directory and swap it in, so the published apt/ is
          # never in a half-updated state on disk.
          rm -rf gh-pages-dir/apt.new
          mkdir -p gh-pages-dir/apt.new
          cp src-tauri/target/release/bundle/deb/*.deb gh-pages-dir/apt.new/

          staged=$(ls -1 gh-pages-dir/apt.new/*.deb 2>/dev/null | wc -l) || true
          if [ "${staged:-0}" -eq 0 ]; then
            echo "::error::staging directory is empty after copy - aborting before publish"
            rm -rf gh-pages-dir/apt.new
            exit 1
          fi

          rm -f gh-pages-dir/apt/*.deb
          mv gh-pages-dir/apt.new/*.deb gh-pages-dir/apt/
          rmdir gh-pages-dir/apt.new

          # Generate APT repo metadata
          cd gh-pages-dir/apt
          dpkg-scanpackages --multiversion . /dev/null > Packages
          gzip -k -f Packages

          # Generate Release file
          apt-ftparchive release . > Release

          # Sign it.
          #
          # An unsigned repository is why the install instructions needed
          # [trusted=yes], a flag that tells apt to skip verification entirely.
          # That matters more here than for most repos: this package ships a
          # root-invoked fan helper and a polkit rule, and dpkg maintainer
          # scripts run as root. HTTPS authenticates the host for the duration
          # of the transfer; it says nothing about whether the bytes sitting on
          # the branch, or in any cache in front of it, are the ones we built.
          if [ -n "${APT_GPG_PRIVATE_KEY:-}" ]; then
            GNUPGHOME="$(mktemp -d)"
            export GNUPGHOME
            chmod 700 "$GNUPGHOME"

            printf '%s' "$APT_GPG_PRIVATE_KEY" | gpg --batch --quiet --import
            key_id=$(gpg --batch --list-secret-keys --with-colons \
                     | awk -F: '/^sec:/ {print $5; exit}')
            if [ -z "$key_id" ]; then
              echo "::error::APT_GPG_PRIVATE_KEY is set but contains no secret key"
              exit 1
            fi

            # InRelease (inline signature) is what modern apt prefers;
            # Release.gpg is the detached form older clients still look for.
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase "${APT_GPG_PASSPHRASE:-}" --local-user "$key_id" \
                --clearsign -o InRelease Release
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase "${APT_GPG_PASSPHRASE:-}" --local-user "$key_id" \
                -abs -o Release.gpg Release

            # Publish the public half so users can pin it with signed-by=.
            gpg --batch --armor --export "$key_id" > thinkutils-archive-keyring.asc

            # Fail loudly rather than publishing a signature that does not
            # verify -- apt treats a bad signature as harder breakage than none.
            gpg --batch --verify Release.gpg Release
            echo "signed the Release file with ${key_id}"

            rm -rf "$GNUPGHOME"
            unset GNUPGHOME
            SIGNED=1
          else
            # Critical: a previous run may have published a signature. Leaving a
            # stale InRelease next to a regenerated Release breaks apt outright
            # for everyone, which is strictly worse than being unsigned.
            rm -f InRelease Release.gpg thinkutils-archive-keyring.asc
            SIGNED=0
            echo "::warning::APT_GPG_PRIVATE_KEY is not configured. Publishing an \
          UNSIGNED repository; users must keep [trusted=yes], which disables \
          verification. See docs/development/apt-signing.md to set this up."
          fi

          # Create index page, matching whichever form was actually published.
          if [ "$SIGNED" = "1" ]; then
            sources_line='deb [signed-by=/usr/share/keyrings/thinkutils-archive-keyring.gpg] https://gh.vietanh.dev/ThinkUtils/apt ./'
            cat > ../index.html << HTMLEOF
          <!DOCTYPE html>
          <html>
          <head><title>ThinkUtils APT Repository</title></head>
          <body>
          <h1>ThinkUtils APT Repository</h1>
          <p>Add this repository to install ThinkUtils via apt:</p>
          <pre>
          curl -fsSL https://gh.vietanh.dev/ThinkUtils/apt/thinkutils-archive-keyring.asc \\
            | sudo gpg --dearmor -o /usr/share/keyrings/thinkutils-archive-keyring.gpg
          echo "${sources_line}" | sudo tee /etc/apt/sources.list.d/thinkutils.list
          sudo apt update
          sudo apt install thinkutils
          </pre>
          </body>
          </html>
          HTMLEOF
          else
            cat > ../index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head><title>ThinkUtils APT Repository</title></head>
          <body>
          <h1>ThinkUtils APT Repository</h1>
          <p><strong>This repository is not signed.</strong> The command below uses
          <code>[trusted=yes]</code>, which disables apt's signature checking.</p>
          <pre>
          echo "deb [trusted=yes] https://gh.vietanh.dev/ThinkUtils/apt ./" | sudo tee /etc/apt/sources.list.d/thinkutils.list
          sudo apt update
          sudo apt install thinkutils
          </pre>
          </body>
          </html>
          HTMLEOF
          fi

          # An index INSIDE apt/ as well as at the root.
          #
          # The sources.list line contains .../ThinkUtils/apt, so that is the URL
          # people copy -- and pasting it into a browser returned "Page not
          # found", because the generated page lands at the repository root and
          # a static host serves no directory listing. apt itself was never
          # affected: it fetches apt/InRelease and apt/Packages by name. But a
          # 404 at the address printed in the install instructions reads as a
          # broken repository, which is a bad first impression of a page whose
          # whole job is to be trusted.
          cat > index.html << 'APTEOF'
          <!DOCTYPE html>
          <html>
          <head><title>ThinkUtils APT repository</title></head>
          <body>
          <h1>ThinkUtils APT repository</h1>
          <p>This is a package repository, not a web page. Point <code>apt</code>
          at it rather than browsing it &mdash; see
          <a href="../">the install instructions</a>.</p>
          <p>Files served here:</p>
          <ul>
            <li><a href="InRelease">InRelease</a> &mdash; signed release metadata</li>
            <li><a href="Release">Release</a> and <a href="Release.gpg">Release.gpg</a></li>
            <li><a href="Packages">Packages</a> / <a href="Packages.gz">Packages.gz</a></li>
            <li><a href="thinkutils-archive-keyring.asc">thinkutils-archive-keyring.asc</a> &mdash; the signing key</li>
          </ul>
          </body>
          </html>
          APTEOF

          # Commit and push
          cd ..
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update APT repository for ${{ steps.version.outputs.version }}"
          git push origin gh-pages

      - name: Upload artifacts (non-tag builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v7
        with:
          name: thinkutils-packages-${{ steps.version.outputs.version }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
